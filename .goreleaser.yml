version: 2
before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - openbsd
    ldflags:
      - -X github.com/noqqe/ipcalc/pkg/ipcalc.Version={{.Tag}}
    flags:
      - -v
    main: ./cmd/ipcalc
archives:
  - id: ipcalc
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
brews:
  - name: ipcalc
    goarm: 6
    repository:
      owner: noqqe
      name: homebrew-tap
    download_strategy: CurlDownloadStrategy
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: goreleaser@carlosbecker.com
    homepage: "https://github.com/noqqe/ipcalc"
    description: "ipcalc - subnetting/aggregating"
    license: "MIT"
    test: |
      system "#{bin}/ipcalc --version"
    install: |
      bin.install "ipcalc"

