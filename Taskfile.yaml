# https://taskfile.dev

version: '3'

tasks:

  build:
    cmds:
      - go build -ldflags "-X github.com/noqqe/ipcalc/pkg/ipcalc.Version=`git describe --tags`"  -o ipcalc -v cmd/ipcalc.go
    sources:
      - "pkg/ipcalc/*.go"
      - "cmd/*.go"
    generates:
      - "./ipcalc"

  release:
    interactive: true
    cmds:
      - git tag | tail -5
      - read -p "Version 1.1.1 " version ; git tag $version
      - git push --tags
      - goreleaser release --clean

  default:
    cmds:
      - task: build

